server.port=${SERVER_PORT:8080}

services.auth.url=${SERVICES_AUTH_URL:http://localhost:8081}
services.user.url=${SERVICES_USER_URL:http://localhost:8082}
services.startup.url=${SERVICES_STARTUP_URL:http://localhost:8083}
services.investment.url=${SERVICES_INVESTMENT_URL:http://localhost:8084}
services.team.url=${SERVICES_TEAM_URL:http://localhost:8085}
services.messaging.url=${SERVICES_MESSAGING_URL:http://localhost:8086}
services.notification.url=${SERVICES_NOTIFICATION_URL:http://localhost:8087}

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${services.auth.url}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=${services.user.url}
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[2].id=startup-service
spring.cloud.gateway.routes[2].uri=${services.startup.url}
spring.cloud.gateway.routes[2].predicates[0]=Path=/startups/**

spring.cloud.gateway.routes[3].id=investment-service
spring.cloud.gateway.routes[3].uri=${services.investment.url}
spring.cloud.gateway.routes[3].predicates[0]=Path=/investments/**

spring.cloud.gateway.routes[4].id=team-service
spring.cloud.gateway.routes[4].uri=${services.team.url}
spring.cloud.gateway.routes[4].predicates[0]=Path=/teams/**

spring.cloud.gateway.routes[5].id=messaging-service
spring.cloud.gateway.routes[5].uri=${services.messaging.url}
spring.cloud.gateway.routes[5].predicates[0]=Path=/messages/**

spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=${services.notification.url}
spring.cloud.gateway.routes[6].predicates[0]=Path=/notifications/**

spring.cloud.gateway.routes[7].id=auth-service-swagger
spring.cloud.gateway.routes[7].uri=${services.auth.url}
spring.cloud.gateway.routes[7].predicates[0]=Path=/aggregate/auth-service/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[8].id=user-service-swagger
spring.cloud.gateway.routes[8].uri=${services.user.url}
spring.cloud.gateway.routes[8].predicates[0]=Path=/aggregate/user-service/v3/api-docs
spring.cloud.gateway.routes[8].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[9].id=startup-service-swagger
spring.cloud.gateway.routes[9].uri=${services.startup.url}
spring.cloud.gateway.routes[9].predicates[0]=Path=/aggregate/startup-service/v3/api-docs
spring.cloud.gateway.routes[9].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[10].id=investment-service-swagger
spring.cloud.gateway.routes[10].uri=${services.investment.url}
spring.cloud.gateway.routes[10].predicates[0]=Path=/aggregate/investment-service/v3/api-docs
spring.cloud.gateway.routes[10].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[11].id=team-service-swagger
spring.cloud.gateway.routes[11].uri=${services.team.url}
spring.cloud.gateway.routes[11].predicates[0]=Path=/aggregate/team-service/v3/api-docs
spring.cloud.gateway.routes[11].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[12].id=messaging-service-swagger
spring.cloud.gateway.routes[12].uri=${services.messaging.url}
spring.cloud.gateway.routes[12].predicates[0]=Path=/aggregate/messaging-service/v3/api-docs
spring.cloud.gateway.routes[12].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.routes[13].id=notification-service-swagger
spring.cloud.gateway.routes[13].uri=${services.notification.url}
spring.cloud.gateway.routes[13].predicates[0]=Path=/aggregate/notification-service/v3/api-docs
spring.cloud.gateway.routes[13].filters[0]=SetPath=/v3/api-docs

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/aggregate/auth-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=user-service
springdoc.swagger-ui.urls[1].url=/aggregate/user-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=startup-service
springdoc.swagger-ui.urls[2].url=/aggregate/startup-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=investment-service
springdoc.swagger-ui.urls[3].url=/aggregate/investment-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=team-service
springdoc.swagger-ui.urls[4].url=/aggregate/team-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=messaging-service
springdoc.swagger-ui.urls[5].url=/aggregate/messaging-service/v3/api-docs
springdoc.swagger-ui.urls[6].name=notification-service
springdoc.swagger-ui.urls[6].url=/aggregate/notification-service/v3/api-docs
springdoc.swagger-ui.urls-primary-name=auth-service

management.endpoints.web.exposure.include=health,info,gateway
logging.level.org.springframework.cloud.gateway=INFO
